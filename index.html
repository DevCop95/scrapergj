<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guadalajara Food Guide</title>
    <!-- SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌮</text></svg>">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#f59e0b',
                        secondary: '#ef4444',
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- SheetJS CDN for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Fuse.js CDN for fuzzy search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(31, 41, 55, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- Animated Food Loading Screen -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white dark:bg-gray-900 transition-opacity duration-500">
        <div class="relative mb-6">
            <div id="food-icon" class="text-8xl transition-all duration-700 ease-in-out transform">🌮</div>
        </div>
        <div class="text-center">
            <h2 class="text-2xl font-bold bg-gradient-to-r from-[#006847] via-gray-600 to-[#CE1126] bg-clip-text text-transparent mb-2 animate-pulse">
                Cocinando tu guía...
            </h2>
            <p id="food-text" class="text-gray-500 dark:text-gray-400 font-semibold">Tacos & Varios</p>
        </div>
    </div>

    <!-- Sticky Header -->
    <header class="sticky top-0 z-50 glass border-b border-gray-200 dark:border-gray-800 px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                    <i class="fa-solid fa-map-location-dot mr-2"></i>GDL Food Guide
                </h1>
                <p id="total-badge" class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold mt-0.5">Cargando total...</p>
            </div>
            <div class="flex items-center gap-2">
                <button id="export-excel" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors flex items-center gap-2 text-sm font-semibold">
                    <i class="fa-solid fa-file-excel"></i>
                    <span class="hidden sm:inline">Exportar Excel</span>
                </button>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
        <!-- Search Bar -->
        <div class="relative mb-6">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" id="search-input" 
                placeholder="Buscar por nombre, dirección o especialidad..." 
                class="w-full pl-10 pr-4 py-3 rounded-2xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all shadow-sm">
        </div>

        <!-- Category Tabs -->
        <div class="flex space-x-2 mb-8 overflow-x-auto pb-2 custom-scrollbar no-scrollbar">
            <button data-category="tacos" class="tab-btn active px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all bg-primary text-white shadow-md">
                <i class="fa-solid fa-taco mr-2 text-white"></i>Tacos y Varios
            </button>
            <button data-category="tortas" class="tab-btn px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-gray-700 hover:border-primary">
                <i class="fa-solid fa-bread-slice mr-2 text-secondary"></i>Tortas Ahogadas
            </button>
            <button data-category="menudo" class="tab-btn px-5 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-all bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-gray-700 hover:border-primary">
                <i class="fa-solid fa-bowl-hot mr-2 text-primary"></i>Menuderías
            </button>
        </div>

        <!-- Content Grid -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Loading State -->
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                <p>Cargando sabores tapatíos...</p>
            </div>
        </div>

        <!-- Empty State (Hidden) -->
        <div id="empty-state" class="hidden col-span-full flex flex-col items-center justify-center py-20 text-gray-400">
            <i class="fa-solid fa-utensils text-4xl mb-4"></i>
            <p>No encontramos nada con ese nombre. ¡Prueba otra búsqueda!</p>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-500 text-xs border-t border-gray-200 dark:border-gray-800 mt-10">
        <p>© 2026 GDL Food Guide • Creado por Devcop95</p>
    </footer>

    <script>
        const FILES = {
            tacos: 'enriched_-Negocio-Direccin--PrecioMXN-Especialidad-GoogleMa.csv',
            tortas: 'enriched_-Negocio-Direccin--PrecioMXN-Observaciones-GoogleM.csv',
            menudo: 'enriched_-Negocio-Direccin--PrecioMXN-Perfildecliente-Googl.csv'
        };

        let dataStore = {
            tacos: [],
            tortas: [],
            menudo: []
        };

        let currentCategory = 'tacos';
        let searchQuery = '';

        // --- Core Functions ---

        async function init() {
            try {
                await Promise.all([
                    loadCSV('tacos', FILES.tacos).catch(() => loadCSV('tacos', '-Negocio-Direccin--PrecioMXN-Especialidad-GoogleMa.csv')),
                    loadCSV('tortas', FILES.tortas).catch(() => loadCSV('tortas', '-Negocio-Direccin--PrecioMXN-Observaciones-GoogleM.csv')),
                    loadCSV('menudo', FILES.menudo).catch(() => loadCSV('menudo', '-Negocio-Direccin--PrecioMXN-Perfildecliente-Googl.csv'))
                ]);
                render();
                
                const total = dataStore.tacos.length + dataStore.tortas.length + dataStore.menudo.length;
                document.getElementById('total-badge').textContent = `${total} negocios de comida con >800 opiniones`;

                // Reducido a 800ms para evitar bloquear clics del usuario innecesariamente
                setTimeout(() => {
                    const overlay = document.getElementById('loading-overlay');
                    if (foodInterval) clearInterval(foodInterval);
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                }, 800);
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('cards-container').innerHTML = `
                    <div class="col-span-full text-center text-red-500 py-10">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-2"></i>
                        <p>Error al cargar los datos. Por favor intenta de nuevo.</p>
                    </div>`;
            }
        }

        async function loadCSV(key, url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error('File not found');
            const csvText = await response.text();

            return new Promise((resolve) => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const requiredCols = ['Negocio', 'Dirección'];
                        const headers = results.meta.fields || [];
                        const missing = requiredCols.filter(col => !headers.includes(col));

                        if (missing.length > 0) {
                            console.error(`CSV missing required columns: ${missing.join(', ')}`);
                            dataStore[key] = [];
                            resolve();
                            return;
                        }

                        dataStore[key] = results.data.map((item, index) => ({
                            rank: item['#'] || (index + 1).toString(),
                            name: item['Negocio'] || '',
                            address: item['Dirección'] || '',
                            rating: item['⭐'] || '0',
                            price: item['💰 Precio (MXN)'] || 'N/A',
                            detail: item['📝 Especialidad'] || item['📝 Observaciones'] || item['📝 Perfil de cliente'] || '',
                            maps: item['📍 Google Maps'] || 'N/A',
                            phone: item['phone'] || 'N/A',
                            hours: item['hours'] || 'N/A',
                            photo: item['photo'] || '',
                            reviewCount: item['reviewCount'] || '0',
                            fullHours: item['fullHours'] || 'N/A',
                            priceLevel: item['priceLevel'] || 'N/A',
                            category: item['category'] || 'N/A',
                            isTop10: item['isTop10'] === 'true'
                        }));

                        // Sort by reviewCount DESC, then by rating DESC
                        dataStore[key].sort((a, b) => {
                            const aReviews = parseInt(a.reviewCount) || 0;
                            const bReviews = parseInt(b.reviewCount) || 0;
                            if (bReviews !== aReviews) return bReviews - aReviews;
                            return parseFloat(b.rating) - parseFloat(a.rating);
                        });

                        // Update rankings sequentially after sort
                        dataStore[key].forEach((item, idx) => {
                            item.rank = (idx + 1).toString();
                        });

                        // Update tab button count dynamically
                        updateTabCount(key, dataStore[key].length);

                        resolve();
                    },
                    error: (error) => {
                        console.error(`Error parsing CSV for ${key}:`, error);
                        dataStore[key] = [];
                        resolve();
                    }
                });
            });
        }

        function updateTabCount(category, count) {
            const btn = document.querySelector(`button[data-category="${category}"]`);
            if (!btn) return;
            let iconHtml = '';
            if (category === 'tacos') iconHtml = '<i class="fa-solid fa-taco mr-2"></i>';
            else if (category === 'tortas') iconHtml = '<i class="fa-solid fa-bread-slice mr-2"></i>';
            else if (category === 'menudo') iconHtml = '<i class="fa-solid fa-bowl-hot mr-2"></i>';
            
            let name = '';
            if (category === 'tacos') name = 'Tacos y Varios';
            else if (category === 'tortas') name = 'Tortas Ahogadas';
            else if (category === 'menudo') name = 'Menuderías';
            
            btn.innerHTML = `${iconHtml}${name} (${count})`;
        }

        function render() {
            const container = document.getElementById('cards-container');
            const emptyState = document.getElementById('empty-state');

            let filteredData;
            if (!searchQuery) {
                filteredData = dataStore[currentCategory];
            } else if (searchQuery.length < 3) {
                filteredData = dataStore[currentCategory].filter(item => {
                    const searchStr = `${item.name} ${item.address} ${item.detail}`.toLowerCase();
                    return searchStr.includes(searchQuery.toLowerCase());
                });
            } else {
                const fuse = new Fuse(dataStore[currentCategory], {
                    keys: ['name', 'address', 'detail'],
                    threshold: 0.3,
                    ignoreLocation: true,
                    minMatchCharLength: 2
                });
                const results = fuse.search(searchQuery);
                filteredData = results.map(r => r.item);
            }

            if (filteredData.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = filteredData.map(item => createCard(item)).join('');
        }

        function createCard(item) {
            const mapsUrl = (item.maps && item.maps !== 'N/A')
                ? item.maps
                : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent('"' + item.name + '" ' + item.address + ' Guadalajara Jalisco')}`;
            const hasPhoto = item.photo && item.photo !== 'N/A';
            
            return `
                <div class="bg-white dark:bg-gray-800 rounded-3xl overflow-hidden shadow-sm border ${item.isTop10 ? 'border-amber-400 dark:border-amber-600 ring-2 ring-amber-200 dark:ring-amber-900/50' : 'border-gray-100 dark:border-gray-700'} hover:shadow-md transition-all group relative">
                    ${item.isTop10 ? `
                    <div class="absolute top-0 left-0 z-10 bg-gradient-to-r from-amber-500 to-amber-600 text-white px-3 py-1 rounded-br-xl text-xs font-bold flex items-center gap-1 shadow-lg">
                        <i class="fa-solid fa-crown"></i>
                        <span>Top Cliente</span>
                    </div>
                    ` : ''}
                    ${hasPhoto ? `
                    <div class="h-40 w-full overflow-hidden">
                        <img src="${item.photo}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    ` : ''}
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                <h3 class="font-bold text-lg group-hover:text-primary transition-colors ${item.isTop10 ? 'text-amber-700 dark:text-amber-400' : ''}">#${item.rank} ${item.name}</h3>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">
                                    <i class="fa-solid fa-location-dot mr-1"></i>${item.address}
                                </p>
                            </div>
                            <div class="flex flex-col items-end gap-1">
                                <span class="flex items-center px-2 py-1 bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 text-xs font-bold rounded-lg border border-amber-100 dark:border-amber-800">
                                    <i class="fa-solid fa-star mr-1 text-[10px]"></i>${item.rating}
                                </span>
                                ${item.reviewCount && item.reviewCount !== '0' ? `
                                <span class="text-[10px] text-gray-500 dark:text-gray-400">
                                    ${parseInt(item.reviewCount).toLocaleString()} reseñas
                                </span>
                                ` : ''}
                            </div>
                        </div>
                        
                        <div class="space-y-2 mb-5">
                            <div class="flex items-center text-sm text-gray-600 dark:text-gray-300">
                                <i class="fa-solid fa-tag w-5 text-gray-400 dark:text-gray-500"></i>
                                <span class="font-medium">${item.price}</span>
                            </div>
                            ${item.phone !== 'N/A' ? `
                            <div class="flex items-center text-sm text-gray-600 dark:text-gray-300">
                                <i class="fa-solid fa-phone w-5 text-gray-400 dark:text-gray-500"></i>
                                <span>${item.phone}</span>
                            </div>
                            ` : ''}
                            ${item.isTop10 && item.fullHours !== 'N/A' ? `
                            <div class="flex items-start text-sm text-gray-600 dark:text-gray-300">
                                <i class="fa-solid fa-clock w-5 mt-1 text-gray-400 dark:text-gray-500"></i>
                                <span class="flex-1 text-xs">${item.fullHours.replace(/\|/g, '<br>')}</span>
                            </div>
                            ` : item.hours !== 'N/A' ? `
                            <div class="flex items-start text-sm text-gray-600 dark:text-gray-300">
                                <i class="fa-solid fa-clock w-5 mt-1 text-gray-400 dark:text-gray-500"></i>
                                <span class="flex-1">${item.hours}</span>
                            </div>
                            ` : ''}
                            <div class="flex items-start text-sm text-gray-600 dark:text-gray-300">
                                <i class="fa-solid fa-comment-dots w-5 mt-1 text-gray-400 dark:text-gray-500"></i>
                                <p class="flex-1 leading-snug">${item.detail}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-2">
                            <a href="${mapsUrl}" target="_blank"
                                class="py-3 bg-gray-100 dark:bg-gray-700 hover:bg-primary hover:text-white dark:hover:bg-primary text-gray-700 dark:text-gray-200 font-bold rounded-2xl flex items-center justify-center transition-all text-xs">
                                <i class="fa-solid fa-diamond-turn-right mr-2"></i>Ver en Mapa
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Event Listeners ---

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            render();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active', 'bg-primary', 'text-white', 'shadow-md');
                    b.classList.add('bg-white', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400', 'border-gray-200', 'dark:border-gray-700');
                    b.querySelector('i').classList.remove('text-white');
                });
                btn.classList.add('active', 'bg-primary', 'text-white', 'shadow-md');
                btn.classList.remove('bg-white', 'dark:bg-gray-800', 'text-gray-600', 'dark:text-gray-400', 'border-gray-200', 'dark:border-gray-700');
                btn.querySelector('i').classList.add('text-white');
                currentCategory = btn.dataset.category;
                render();
            });
        });

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggle.addEventListener('click', () => {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        });

        // Excel Export — includes Reseñas column, sorted by reviewCount DESC
        document.getElementById('export-excel').addEventListener('click', () => {
            console.log("Botón de exportar Excel clickeado");
            
            if (typeof XLSX === 'undefined') {
                alert("Error: La librería de exportación de Excel (SheetJS) no se ha cargado correctamente.");
                console.error("SheetJS (XLSX) is undefined.");
                return;
            }

            try {
                const workbook = XLSX.utils.book_new();

                const categories = [
                    { key: 'tacos', name: 'Tacos y Varios' },
                    { key: 'tortas', name: 'Tortas Ahogadas' },
                    { key: 'menudo', name: 'Menuderías' }
                ];

                categories.forEach(cat => {
                    // dataStore ya viene ordenado por reviewCount DESC desde loadCSV
                    const data = dataStore[cat.key].map((item, index) => ({
                        '#': index + 1,
                        'Negocio': item.name,
                        'Dirección': item.address,
                        'Calificación': parseFloat(item.rating) || 0,
                        'Reseñas': parseInt(item.reviewCount) || 0,
                        'Precio': item.price,
                        'Teléfono': item.phone,
                        'Horario': item.hours,
                        'Detalles': item.detail
                    }));

                    const worksheet = XLSX.utils.json_to_sheet(data);

                    // Columna J = Google Maps (index 9)
                    worksheet['J1'] = { t: 's', v: 'Google Maps' };

                    dataStore[cat.key].forEach((item, index) => {
                        const row = index + 2;
                        const mapsUrl = item.maps && item.maps !== 'N/A'
                            ? item.maps
                            : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent('"' + item.name + '" ' + item.address)}`;
                        const mapsCell = XLSX.utils.encode_cell({ r: row - 1, c: 9 });
                        worksheet[mapsCell] = { t: 's', v: 'Ver en Mapa', l: { Target: mapsUrl } };
                    });

                    const range = XLSX.utils.decode_range(worksheet['!ref']);
                    range.e.c = 9;
                    worksheet['!ref'] = XLSX.utils.encode_range(range);

                    worksheet['!cols'] = [
                        { wch: 5 },   // #
                        { wch: 30 },  // Negocio
                        { wch: 40 },  // Dirección
                        { wch: 12 },  // Calificación
                        { wch: 12 },  // Reseñas
                        { wch: 15 },  // Precio
                        { wch: 15 },  // Teléfono
                        { wch: 25 },  // Horario
                        { wch: 50 },  // Detalles
                        { wch: 15 }   // Google Maps
                    ];

                    XLSX.utils.book_append_sheet(workbook, worksheet, cat.name);
                });

                const summaryData = [
                    { 'Categoría': 'Tacos y Varios', 'Total Negocios': dataStore.tacos.length },
                    { 'Categoría': 'Tortas Ahogadas', 'Total Negocios': dataStore.tortas.length },
                    { 'Categoría': 'Menuderías', 'Total Negocios': dataStore.menudo.length },
                    { 'Categoría': 'TOTAL', 'Total Negocios': dataStore.tacos.length + dataStore.tortas.length + dataStore.menudo.length }
                ];
                const summarySheet = XLSX.utils.json_to_sheet(summaryData);
                summarySheet['!cols'] = [{ wch: 20 }, { wch: 15 }];
                XLSX.utils.book_append_sheet(workbook, summarySheet, 'Resumen');

                const today = new Date().toISOString().split('T')[0];
                console.log("Generando y descargando archivo Excel...");
                XLSX.writeFile(workbook, `GDL_Food_Guide_${today}.xlsx`);
                console.log("Descarga iniciada exitosamente.");
            } catch (error) {
                alert("Error durante la generación de Excel: " + error.message);
                console.error("Error al exportar a Excel:", error);
            }
        });

        // Animated food loading sequence
        const foodSequence = [
            { icon: '🌮', text: 'Tacos & Varios' },
            { icon: '🥖', text: 'Tortas Ahogadas' },
            { icon: '🍲', text: 'Menuderías' }
        ];
        let currentFood = 0;
        let foodInterval;

        function rotateFood() {
            const foodIcon = document.getElementById('food-icon');
            const foodText = document.getElementById('food-text');
            if (!foodIcon || !foodText) return;
            foodIcon.style.transform = 'rotateY(90deg) scale(0.5)';
            foodIcon.style.opacity = '0';
            setTimeout(() => {
                currentFood = (currentFood + 1) % foodSequence.length;
                foodIcon.textContent = foodSequence[currentFood].icon;
                foodText.textContent = foodSequence[currentFood].text;
                setTimeout(() => {
                    foodIcon.style.transform = 'rotateY(0deg) scale(1)';
                    foodIcon.style.opacity = '1';
                }, 50);
            }, 350);
        }

        foodInterval = setInterval(rotateFood, 1200);
        init();
    </script>
</body>
</html>
